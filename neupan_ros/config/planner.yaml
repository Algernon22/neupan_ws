collision_threshold: 0.15
receding: 25
step_time: 0.1
ref_speed: 1.0

robot:
  length: 0.64
  width: 0.64
  height: 0.54
  max_speed: [1.0, 1.0, 1.0, 0.8]
  max_acce: [2.5, 2.5, 1.5, 0.8]
  tau_velocity: [0.45, 0.45, 0.35]
  gain_velocity: [1.0, 1.0, 1.0]
  tau_yaw_rate: 0.30
  gain_yaw_rate: 1.0
  velocity_weight_scale: 0.35

ipath:
  smooth_method: bezier
  bezier_corner_ratio: 0.25
  bezier_corner_max: 3.0
  bezier_samples: 15
  bezier_angle_threshold_deg: 5.0
  yaw_from_tangent: true
  warn_infeasible_ref_speed: true
  waypoints:
    - [0.0, 0.0, 1.0, 0.0]
    - [8.0, 3.0, 1.0, 0.0]
    - [15.0, 0.0, 1.0, 0.0]
  arrive_threshold: 0.8

preselect:
  enable: true
  corridor_margin: [6.0, 6.0, 2.0]
  exact_margin: [0.35, 0.35, 0.25]
  hard_distance: 0.90
  per_step: 4
  nearest_quota_ratio: 0.60
  diversity_enable: true
  diversity_voxel_size: [0.8, 0.8, 0.4]
  diversity_quota_ratio: 0.20
  temporal_enable: true
  temporal_radius: 0.45
  temporal_quota_ratio: 0.20

farfield_guide:
  enable: true
  range_backoff: 1.0
  range_scale: 1.5
  lateral_width: 5.0
  center_width: 2.0
  height_window: 1.5
  voxel_size: [1.0, 1.0, 0.8]
  trigger_count: 14
  offset_min: 1.5
  offset_max: 4.0
  offset_speed_gain: 0.60
  offset_alpha: 0.20
  release_alpha: 0.08
  release_count: 4
  release_confirm_cycles: 3

pan:
  # iter_num 是每个规划周期内 DUNE + NRMP 最多运行的轮数。
  # 当 iter_num >= 2 时，PAN 会比较当前轮和上一轮结果：
  # 轨迹变化小于 trajectory_threshold 且 DUNE 变化小于 dune_threshold 时提前停止。
  # 当前 iter_num: 1 只运行一轮，因此两个收敛阈值不会参与停止判断。
  iter_num: 1
  trajectory_threshold: 0.05  # 状态/控制轨迹 RMS 变化收敛阈值
  dune_threshold: 0.01        # DUNE mu/lambda RMS 变化收敛阈值
  nrmp_max_num: 20
  dune_select_nearest_ratio: 0.60
  dune_select_temporal_ratio: 0.20
  dune_select_diversity_ratio: 0.20

adjust:
  q_s: 1.1
  p_u: 1.5
  enable_control_smoothing: true    # 平滑总开关；false 时忽略 smooth_du/smooth_u0。
  smooth_du: 0.8      # 惩罚相邻规划控制差值；越大控制序列越平滑。
  smooth_u0: 6.0      # 惩罚首个规划控制偏离上一实际发布控制；越大跨周期跳变越小。
  eta: 6.0
  d_max: 4.0         # 最多远离障碍多d_max米
  d_min: 0.8         # 与障碍物至少保持多远
  ro_obs: 260
  bk: 0.18
  solver_args:
    eps_abs: 4.0e-4
    eps_rel: 4.0e-4
    max_iter: 1000
    warm_starting: true
    polishing: false
    verbose: false
